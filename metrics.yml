name: Metrics

on: schedule: - cron: "0 */12 * \* \*" workflow_dispatch:

jobs: github-metrics: runs-on: ubuntu-latest steps: - uses:
lowlighter/metrics@latest with: token: \${{ secrets.METRICS_TOKEN }}
user: byasilbekdev template: classic base: header, activity,
repositories, metadata plugin_languages: yes plugin_isocalendar: yes
filename: github-metrics.svg
